<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galactic Unicorn Coinflip Emulator</title>

    <link rel="stylesheet" href="src/css/style.css" />
  </head>

  <body>
    <div id="toolbar">
      <button id="run-button" class="toolbar-btn" title="Run" disabled>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="20"
          height="20"
        >
          <polygon points="5,3 19,12 5,21" fill="#4ec94e" />
        </svg>
        <span class="tooltip">Run</span>
      </button>
      <button id="stop-button" class="toolbar-btn" title="Stop">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="20"
          height="20"
        >
          <rect x="4" y="4" width="16" height="16" fill="#ec4e4e" />
        </svg>
        <span class="tooltip">Stop</span>
      </button>
      <a
        href="docs/generated/api.html"
        target="_blank"
        rel="noopener noreferrer"
        class="toolbar-btn toolbar-btn-docs"
        title="Open Lua API docs"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="20"
          height="20"
        >
          <circle cx="12" cy="12" r="9" fill="#cfd8dc" />
          <path
            d="M9.8 9.5a2.2 2.2 0 1 1 3.4 1.8c-.9.6-1.4 1.1-1.4 2.1"
            fill="none"
            stroke="#1e1e1e"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="11.8" cy="16.8" r="0.9" fill="#1e1e1e" />
        </svg>
        <span class="tooltip">API docs</span>
      </a>
    </div>
    <div id="container">
      <div id="app">
        <div id="display-wrapper">
          <canvas id="display"></canvas>
        </div>
        <div class="resizer resizer-h"></div>
        <div id="console">
          <pre id="console-output"></pre>
        </div>
      </div>
      <div class="resizer resizer-v"></div>
      <div id="monaco-container"></div>
    </div>

    <!-- Load Fengari -->
    <script src="dist/fengari.js"></script>
    <!-- Shared color conversion utilities (global for module + AMD scripts) -->
    <script src="src/js/color.js"></script>
    <!-- Load Monaco's AMD loader -->
    <script src="https://unpkg.com/monaco-editor@0.55.1/min/vs/loader.js"></script>

    <!-- Configure the loader to use the CDN (must stay a plain script: uses AMD require()) -->
    <script src="src/js/monaco.js"></script>
    <!-- App entry point -->
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
