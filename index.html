<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galactic Unicorn SDK</title>

    <link rel="stylesheet" href="/src/css/style.css" />
  </head>

  <body>
    <div id="toolbar">
      <button id="run-btn" class="toolbar-btn" title="Run" disabled>
        <img src="./assets/images/play-button.svg" alt="Run" />
        <span class="tooltip">Run</span>
      </button>
      <button id="stop-btn" class="toolbar-btn" title="Stop">
        <img src="./assets/images/stop-button.svg" alt="Stop" />
        <span class="tooltip">Stop</span>
      </button>
      <button id="flash-btn" class="toolbar-btn" title="Flash to device">
        <img src="./assets/images/flash-button.svg" alt="Flash" />
        <span class="tooltip">Flash</span>
      </button>
      <a
        href="./docs/api.html"
        target="_blank"
        rel="noopener noreferrer"
        class="toolbar-btn toolbar-btn-docs"
        title="Open Lua API docs"
      >
        <img src="./assets/images/help.svg" alt="Help icon" />
        <span class="tooltip">API docs</span>
      </a>
    </div>
    <div id="container">
      <div id="app">
        <div id="display-wrapper" aria-label="LED Matrix emulator">
          <canvas id="display"></canvas>
        </div>
        <div class="resizer resizer-h" data-fixed="next"></div>
        <div id="console" aria-label="Serial output">
          <pre id="console-output"></pre>
        </div>
      </div>
      <div class="resizer resizer-v" data-fixed="prev"></div>
      <div id="monaco-container" aria-label="Text editor"></div>
      <div class="resizer resizer-v" data-fixed="next"></div>
      <aside id="file-explorer-pane" aria-label="Project files">
        <div id="file-explorer-toolbar" aria-label="File actions">
          <button
            type="button"
            id="file-new-btn"
            class="explorer-btn"
            title="New file"
          >
            +
          </button>
          <button
            type="button"
            id="file-upload-btn"
            class="explorer-btn"
            title="Upload file"
          >
            ↑
          </button>
          <button
            type="button"
            id="file-rename-btn"
            class="explorer-btn"
            title="Rename open file"
          >
            ✎
          </button>
          <button
            type="button"
            id="file-delete-btn"
            class="explorer-btn"
            title="Delete open file"
          >
            ×
          </button>
          <button
            type="button"
            id="export-btn"
            class="explorer-btn"
            title="Export project to ZIP"
          >
            ⤴
          </button>
          <input id="file-upload-input" type="file" multiple hidden />
        </div>
        <div id="file-explorer-panels">
          <section
            id="user-files-panel"
            class="file-explorer-panel"
            aria-label="User files"
          >
            <div id="file-explorer" class="file-explorer-tree"></div>
          </section>
          <div class="resizer resizer-h" data-fixed="prev"></div>
          <section
            id="stock-files-panel"
            class="file-explorer-panel"
            aria-label="Stock files"
          >
            <div id="stock-file-explorer" class="file-explorer-tree"></div>
          </section>
        </div>
      </aside>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
