<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galactic Unicorn SDK</title>

    <link rel="stylesheet" href="/src/css/style.css" />
  </head>

  <body>
    <div id="toolbar">
      <button id="run-btn" class="toolbar-btn" title="Run" disabled>
        <img src="./assets/images/play-button.svg" alt="Run" />
        <span class="tooltip">Run</span>
      </button>
      <button id="stop-btn" class="toolbar-btn" title="Stop">
        <img src="./assets/images/stop-btn.svg" alt="Stop" />
        <span class="tooltip">Stop</span>
      </button>
      <a
        href="./docs/api.html"
        target="_blank"
        rel="noopener noreferrer"
        class="toolbar-btn toolbar-btn-docs"
        title="Open Lua API docs"
      >
        <img src="./assets/images/help.svg" alt="Help icon" />
        <span class="tooltip">API docs</span>
      </a>
    </div>
    <div id="container">
      <div id="app">
        <div id="display-wrapper" aria-label="LED Matrix emulator">
          <canvas id="display"></canvas>
        </div>
        <div class="resizer resizer-h"></div>
        <div id="console" aria-label="Serial output">
          <pre id="console-output"></pre>
        </div>
      </div>
      <div class="resizer resizer-v"></div>
      <div id="editor-pane">
        <div id="monaco-container" aria-label="Text editor"></div>
        <div class="resizer resizer-v"></div>
        <aside id="file-explorer-pane" aria-label="Project files">
          <div id="file-explorer-toolbar" aria-label="File actions">
            <button
              type="button"
              id="file-new-btn"
              class="explorer-btn"
              title="New file"
            >
              +
            </button>
            <button
              type="button"
              id="file-upload-btn"
              class="explorer-btn"
              title="Upload file"
            >
              ↑
            </button>
            <button
              type="button"
              id="file-rename-btn"
              class="explorer-btn"
              title="Rename open file"
            >
              ✎
            </button>
            <button
              type="button"
              id="file-delete-btn"
              class="explorer-btn"
              title="Delete open file"
            >
              ×
            </button>
            <button
              type="button"
              id="export-btn"
              class="explorer-btn"
              title="Export project to ZIP"
            >
              ⤴
            </button>
            <input id="file-upload-input" type="file" hidden />
          </div>
          <div id="file-explorer"></div>
        </aside>
      </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
